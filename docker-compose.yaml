services:
  redis:
    image: redis:7-alpine
    container_name: remitly-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  app1:
    build: .
    container_name: remitly-app1
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  app2:
    build: .
    container_name: remitly-app2
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: remitly-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    restart: unless-stopped